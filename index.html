<!DOCTYPE html>
<html>
<head>
  <title>Drozioo Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family: Arial; background:#f1f1f1; }
    header { background:#000; color:#fff; padding:12px; text-align:center; }
    input, button { padding:10px; margin:5px; border-radius:6px; border:none; }
    .container { padding:10px; }
    .product { background:#fff; padding:10px; margin:10px 0; border-radius:10px; }
    img { width:100%; border-radius:10px; }
    .hidden { display:none; }
  </style>
</head>

<body>

<header>
  <h2>Drozioo</h2>
  <input type="text" id="search" placeholder="Search..." onkeyup="searchProduct()">
</header>

<div class="container">

  <div id="products"></div>

  <!-- SELLER -->
  <h3>Seller Panel</h3>
  <input id="sellerPassSet" placeholder="Set Seller Password">
  <button onclick="setPassword('seller')">Set Seller</button>

  <input id="sellerLogin" placeholder="Seller Login">
  <button onclick="login('seller')">Login</button>

  <div id="sellerPanel" class="hidden">
    <h4>Add Product</h4>
    <input id="pname" placeholder="Name">
    <input id="pprice" placeholder="Price">
    <input id="pimg" placeholder="Image URL">
    <textarea id="pdesc" placeholder="Description"></textarea>
    <button onclick="addProduct()">Add</button>
  </div>

  <!-- ADMIN -->
  <h3>Admin Panel</h3>
  <input id="adminPassSet" placeholder="Set Admin Password">
  <button onclick="setPassword('admin')">Set Admin</button>

  <input id="adminLogin" placeholder="Admin Login">
  <button onclick="login('admin')">Login</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCiG9rMuPURjLhJDE3HorL0QrL7qE86h5c",
  authDomain: "drozioostore.firebaseapp.com",
  databaseURL: "https://drozioostore-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "drozioostore"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let isAdmin = false;

// PASSWORD SET
window.setPassword = async function(type){
  let input = document.getElementById(type+"PassSet").value;
  if(!input) return alert("Enter password");

  let r = ref(db,"passwords/"+type);
  let snap = await get(r);

  if(snap.exists()){
    alert("Already set!");
  }else{
    await set(r,input);
    alert(type+" saved");
  }
}

// LOGIN
window.login = async function(type){
  let input = document.getElementById(type+"Login").value;
  let r = ref(db,"passwords/"+type);
  let snap = await get(r);

  if(!snap.exists()){
    alert("Set password first");
    return;
  }

  if(input === snap.val()){
    alert("Login success");

    if(type=="seller"){
      document.getElementById("sellerPanel").classList.remove("hidden");
    }

    if(type=="admin"){
      isAdmin = true;
      loadProducts();
    }

  }else{
    alert("Wrong password");
  }
}

// ADD PRODUCT
window.addProduct = function(){
  let name = document.getElementById("pname").value;
  let price = document.getElementById("pprice").value;
  let img = document.getElementById("pimg").value;
  let desc = document.getElementById("pdesc").value;

  push(ref(db,"products"),{
    name,price,img,desc,time:Date.now()
  });

  alert("Added");
}

// LOAD PRODUCTS
const box = document.getElementById("products");

function loadProducts(){
  onValue(ref(db,"products"), snap=>{
    box.innerHTML="";
    let arr=[];

    snap.forEach(c=>{
      arr.push({id:c.key,...c.val()});
    });

    arr.reverse();

    arr.forEach(d=>{
      box.innerHTML += `
        <div class="product">
          <img src="${d.img}">
          <h3>${d.name}</h3>
          <p>₹${d.price}</p>
          <button onclick="order('${d.name}','${d.price}')">Order</button>
          ${isAdmin ? `
          <button onclick="del('${d.id}')">Delete</button>
          <button onclick="edit('${d.id}')">Edit</button>` : ""}
        </div>
      `;
    });
  });
}

loadProducts();

// DELETE
window.del = function(id){
  remove(ref(db,"products/"+id));
}

// EDIT
window.edit = function(id){
  let newName = prompt("New name");
  let newPrice = prompt("New price");

  update(ref(db,"products/"+id),{
    name:newName,
    price:newPrice
  });
}

// SEARCH
window.searchProduct = function(){
  let v = document.getElementById("search").value.toLowerCase();
  let items = document.getElementsByClassName("product");

  for(let i=0;i<items.length;i++){
    let txt = items[i].innerText.toLowerCase();
    items[i].style.display = txt.includes(v) ? "" : "none";
  }
}

// ORDER
window.order = function(name,price){
  let msg = `Order:\n${name}\n₹${price}`;
  window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
