<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Drozioo – Shop with WhatsApp</title>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #f5f7fb;
      color: #1e293b;
      padding-bottom: 2rem;
    }

    /* logo style: two colors, different font sizes */
    .logo {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .logo span:first-child {
      color: #e11d48; /* deep rose */
      font-size: 2.8rem;
      font-family: 'Segoe UI', 'Poppins', cursive;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.05);
    }
    .logo span:last-child {
      color: #0f3b2c; /* dark forest */
      font-size: 2rem;
      font-weight: 700;
      margin-left: 4px;
    }
    .logo small {
      font-size: 0.85rem;
      font-weight: 400;
      color: #5b6e8c;
      letter-spacing: 1px;
      margin-left: 8px;
    }
    .logo:hover {
      transform: scale(1.01);
    }

    /* banner */
    .hero-banner {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      border-radius: 32px;
      padding: 2rem 1.5rem;
      text-align: center;
      margin: 1.5rem 0;
      box-shadow: 0 15px 30px -12px rgba(0,0,0,0.2);
    }
    .hero-banner h1 {
      font-size: 3rem;
      font-weight: 800;
      color: white;
      letter-spacing: -1px;
    }
    .hero-banner h1 span {
      color: #facc15;
      font-size: 3.2rem;
    }
    .hero-banner p {
      color: #cbd5e1;
      font-size: 1.2rem;
      font-weight: 500;
    }

    /* containers */
    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 20px;
    }
    header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
      border-bottom: 2px solid #e2e8f0;
    }
    .search-box {
      display: flex;
      background: white;
      border-radius: 60px;
      padding: 5px 15px;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border: 1px solid #e2e8f0;
    }
    .search-box i {
      color: #94a3b8;
    }
    .search-box input {
      border: none;
      padding: 10px 12px;
      width: 250px;
      font-size: 0.9rem;
      outline: none;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #cbd5e1;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      margin-left: 8px;
    }
    .btn-primary {
      background: #e11d48;
      border: none;
      color: white;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-primary:hover {
      background: #be123c;
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: #0f3b2c;
      color: white;
      border: none;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 28px;
      margin: 2rem 0;
    }
    .product-card {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      transition: all 0.25s;
      cursor: pointer;
    }
    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 30px -12px rgba(0,0,0,0.15);
    }
    .product-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: #f1f5f9;
    }
    .product-info {
      padding: 1rem;
    }
    .product-title {
      font-weight: 700;
      font-size: 1.1rem;
    }
    .price-row {
      display: flex;
      gap: 12px;
      align-items: baseline;
      margin: 8px 0;
    }
    .current-price {
      font-weight: 800;
      color: #e11d48;
      font-size: 1.3rem;
    }
    .mrp {
      text-decoration: line-through;
      color: #94a3b8;
      font-size: 0.85rem;
    }
    .category-badge {
      background: #eef2ff;
      display: inline-block;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #1e40af;
      margin-top: 6px;
    }
    .stock {
      font-size: 0.7rem;
      color: #16a34a;
      font-weight: 500;
    }
    /* modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-card {
      background: white;
      max-width: 500px;
      width: 90%;
      border-radius: 32px;
      padding: 1.8rem;
      max-height: 85vh;
      overflow-y: auto;
    }
    .close-modal {
      float: right;
      font-size: 1.8rem;
      cursor: pointer;
    }
    /* panels */
    .panel {
      background: white;
      border-radius: 32px;
      padding: 2rem;
      margin: 2rem 0;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
    }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      font-weight: 600;
      display: block;
      margin-bottom: 5px;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #cbd5e1;
      outline: none;
    }
    button {
      cursor: pointer;
    }
    .admin-actions button {
      margin: 5px;
      padding: 6px 12px;
      border-radius: 30px;
    }
    .edit-btn { background: #eab308; color: black; border: none; }
    .delete-btn { background: #dc2626; color: white; border: none; }
    .footer-links {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 2rem;
      flex-wrap: wrap;
    }
    @media (max-width: 640px) {
      .logo span:first-child { font-size: 2rem; }
      .logo span:last-child { font-size: 1.5rem; }
      .hero-banner h1 { font-size: 2rem; }
    }
    .success-msg {
      background: #dcfce7;
      padding: 8px;
      border-radius: 20px;
      margin: 10px 0;
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo" onclick="showHome()">
      <span>DROZIOO</span><span> by Gotm</span> <small>✦</small>
    </div>
    <div style="display: flex; gap: 8px; flex-wrap: wrap;">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search products..." onkeyup="filterProducts()">
      </div>
      <button class="btn-outline" onclick="showSellerLogin()"><i class="fab fa-whatsapp"></i> Seller</button>
      <button class="btn-outline" onclick="showAdminLogin()"><i class="fas fa-crown"></i> Admin</button>
    </div>
  </header>

  <!-- Banner -->
  <div class="hero-banner">
    <h1><span>DROZIOO</span> <br>by Gotm</h1>
    <p>WhatsApp se order karo • India ki fastest selling platform</p>
  </div>

  <!-- Category filter row -->
  <div style="display: flex; gap: 12px; flex-wrap: wrap; margin: 1rem 0;" id="categoryFilterContainer">
    <button class="btn-outline" onclick="filterByCategory('all')" style="background:#eef2ff;">All</button>
  </div>

  <!-- Products grid -->
  <h2><i class="fas fa-store"></i> Trending Products</h2>
  <div id="productsGrid" class="product-grid">Loading products...</div>
</div>

<!-- MODAL: Product Detail -->
<div id="detailModal" class="modal">
  <div class="modal-card">
    <span class="close-modal" onclick="closeDetailModal()">&times;</span>
    <div id="detailContent"></div>
    <button id="orderNowBtn" class="btn-primary" style="width:100%; margin-top:16px;"><i class="fab fa-whatsapp"></i> Order on WhatsApp</button>
  </div>
</div>

<!-- MODAL: Seller Login -->
<div id="sellerLoginModal" class="modal">
  <div class="modal-card">
    <span class="close-modal" onclick="closeModal('sellerLoginModal')">&times;</span>
    <h3>🔐 Seller Login</h3>
    <input type="password" id="sellerPassword" placeholder="Enter seller password" style="margin:15px 0">
    <button class="btn-primary" onclick="authenticateSeller()">Login</button>
    <hr style="margin:15px 0">
    <p>Become a seller? <strong>Connect to our manager</strong></p>
    <button class="btn-outline" onclick="contactManager()"><i class="fab fa-whatsapp"></i> Contact Manager</button>
  </div>
</div>

<!-- MODAL: Admin Login -->
<div id="adminLoginModal" class="modal">
  <div class="modal-card">
    <span class="close-modal" onclick="closeModal('adminLoginModal')">&times;</span>
    <h3>👑 Admin Access</h3>
    <input type="password" id="adminPassword" placeholder="Admin password" style="margin:15px 0">
    <button class="btn-primary" onclick="authenticateAdmin()">Login</button>
  </div>
</div>

<!-- MODAL: Seller Panel (Add Product) -->
<div id="sellerPanelModal" class="modal">
  <div class="modal-card" style="max-width: 700px;">
    <span class="close-modal" onclick="closeModal('sellerPanelModal')">&times;</span>
    <h3><i class="fas fa-plus-circle"></i> Add New Product</h3>
    <div id="sellerForm">
      <div class="form-group"><label>Product Name*</label><input id="prodName" placeholder="e.g. Cotton T-shirt"></div>
      <div class="form-group"><label>Price (₹)*</label><input id="prodPrice" placeholder="299"></div>
      <div class="form-group"><label>MRP (₹)*</label><input id="prodMrp" placeholder="599"></div>
      <div class="form-group"><label>Image URL*</label><input id="prodImage" placeholder="https://..."></div>
      <div class="form-group"><label>Description</label><textarea id="prodDesc" rows="2"></textarea></div>
      <div class="form-group"><label>Category</label><input id="prodCategory" placeholder="Fashion, Electronics, etc"></div>
      <div class="form-group"><label>Quantity (optional)</label><input id="prodQty" placeholder="Only 5 left"></div>
      <div class="form-group"><label>WhatsApp Number (with country code)</label><input id="prodWhatsapp" placeholder="91xxxxxxxxxx"></div>
      <button class="btn-primary" onclick="publishProduct()">Publish Product</button>
    </div>
    <div id="sellerMsg"></div>
  </div>
</div>

<!-- MODAL: Admin Dashboard -->
<div id="adminPanelModal" class="modal">
  <div class="modal-card" style="max-width: 1000px; width:95%">
    <span class="close-modal" onclick="closeModal('adminPanelModal')">&times;</span>
    <h3>📋 Admin Dashboard – Manage Products</h3>
    <div id="adminProductsList" style="max-height: 60vh; overflow-y: auto;">Loading...</div>
  </div>
</div>

<script>
  // ---------- FIREBASE INIT ----------
  const firebaseConfig = {
    apiKey: "AIzaSyCiG9rMuPURjLhJDE3HorL0QrL7qE86h5c",
    authDomain: "drozioostore.firebaseapp.com",
    databaseURL: "https://drozioostore-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "drozioostore",
    storageBucket: "drozioostore.firebasestorage.app",
    messagingSenderId: "930907642567",
    appId: "1:930907642567:web:460334236bea24d3b1bce2",
    measurementId: "G-SJF910VQZ2"
  };
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  // global vars
  let allProducts = [];
  let currentDetailProduct = null;
  let currentCategoryFilter = "all";

  // Helper: fetch products (sorted by createdAt desc)
  async function loadProducts() {
    const snapshot = await database.ref('products').once('value');
    const data = snapshot.val();
    if(data) {
      allProducts = Object.keys(data).map(key => ({ id: key, ...data[key] }));
      allProducts.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
    } else {
      allProducts = [];
    }
    renderCategoryFilters();
    renderProducts();
  }

  function renderCategoryFilters() {
    const cats = new Set();
    allProducts.forEach(p => { if(p.category && p.category.trim()) cats.add(p.category.trim()); });
    const container = document.getElementById('categoryFilterContainer');
    container.innerHTML = `<button class="btn-outline" onclick="filterByCategory('all')" style="background:#eef2ff;">All</button>`;
    for(let cat of cats) {
      container.innerHTML += `<button class="btn-outline" onclick="filterByCategory('${cat.replace(/'/g, "\\'")}')">${cat}</button>`;
    }
  }

  function filterByCategory(cat) {
    currentCategoryFilter = cat;
    renderProducts();
  }

  function filterProducts() {
    renderProducts();
  }

  function renderProducts() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    let filtered = [...allProducts];
    if(currentCategoryFilter !== 'all') {
      filtered = filtered.filter(p => (p.category || '').toLowerCase() === currentCategoryFilter.toLowerCase());
    }
    if(searchTerm) {
      filtered = filtered.filter(p => (p.name || '').toLowerCase().includes(searchTerm));
    }
    const grid = document.getElementById('productsGrid');
    if(filtered.length === 0) {
      grid.innerHTML = '<div style="padding:2rem;text-align:center">✨ No products found ✨</div>';
      return;
    }
    grid.innerHTML = filtered.map(p => `
      <div class="product-card" onclick="showProductDetail('${p.id}')">
        <img class="product-img" src="${p.image || 'https://via.placeholder.com/300'}" onerror="this.src='https://via.placeholder.com/300'">
        <div class="product-info">
          <div class="product-title">${escapeHtml(p.name || 'Product')}</div>
          <div class="price-row"><span class="current-price">₹${p.price || '0'}</span><span class="mrp">₹${p.mrp || ''}</span></div>
          ${p.category ? `<div class="category-badge"><i class="fas fa-tag"></i> ${escapeHtml(p.category)}</div>` : ''}
          ${p.quantity ? `<div class="stock"><i class="fas fa-box"></i> Only ${escapeHtml(p.quantity)} left</div>` : ''}
        </div>
      </div>
    `).join('');
  }

  function showProductDetail(productId) {
    const product = allProducts.find(p => p.id === productId);
    if(!product) return;
    currentDetailProduct = product;
    const detailHtml = `
      <img src="${product.image || 'https://via.placeholder.com/300'}" style="width:100%; border-radius:24px; margin-bottom:1rem;">
      <h2>${escapeHtml(product.name)}</h2>
      <div class="price-row"><span class="current-price">₹${product.price}</span> <span class="mrp">₹${product.mrp}</span></div>
      <p><strong>Category:</strong> ${product.category || 'General'}</p>
      <p><strong>Description:</strong> ${escapeHtml(product.description || 'No description')}</p>
      ${product.quantity ? `<p><i class="fas fa-box"></i> Stock: ${escapeHtml(product.quantity)}</p>` : '<p>Stock: Available</p>'}
    `;
    document.getElementById('detailContent').innerHTML = detailHtml;
    document.getElementById('detailModal').style.display = 'flex';
    const orderBtn = document.getElementById('orderNowBtn');
    orderBtn.onclick = () => openWhatsAppOrder(product);
  }

  function openWhatsAppOrder(product) {
    let sellerWhatsapp = product.whatsapp || '';
    if(!sellerWhatsapp) sellerWhatsapp = '917982095149'; // fallback manager
    let phone = sellerWhatsapp.replace(/\D/g, '');
    if(!phone.startsWith('91')) phone = '91' + phone;
    const message = `I want to order:

Product Name: ${product.name}
Price: ₹${product.price}

My Details:
Full Name:
Mobile Number:
FullAddress:
Pincode:`;
    const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
    window.open(url, '_blank');
  }

  function closeDetailModal() { document.getElementById('detailModal').style.display = 'none'; }

  // Auth & Admin/Seller
  async function authenticateSeller() {
    const pwd = document.getElementById('sellerPassword').value;
    const snapshot = await database.ref('passwords/sellerPassword').once('value');
    const correct = snapshot.val();
    if(pwd === correct) {
      closeModal('sellerLoginModal');
      document.getElementById('sellerPanelModal').style.display = 'flex';
      document.getElementById('sellerMsg').innerHTML = '';
    } else {
      alert('❌ Incorrect seller password');
    }
  }

  async function authenticateAdmin() {
    const pwd = document.getElementById('adminPassword').value;
    const snapshot = await database.ref('passwords/adminPassword').once('value');
    const correct = snapshot.val();
    if(pwd === correct) {
      closeModal('adminLoginModal');
      await showAdminDashboard();
    } else {
      alert('❌ Incorrect admin password');
    }
  }

  async function showAdminDashboard() {
    document.getElementById('adminPanelModal').style.display = 'flex';
    await refreshAdminProductList();
  }

  async function refreshAdminProductList() {
    const snapshot = await database.ref('products').once('value');
    const data = snapshot.val();
    let productsArr = [];
    if(data) {
      productsArr = Object.keys(data).map(key => ({ id: key, ...data[key] }));
      productsArr.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
    }
    const container = document.getElementById('adminProductsList');
    if(productsArr.length === 0) { container.innerHTML = '<p>No products added yet.</p>'; return; }
    container.innerHTML = productsArr.map(p => `
      <div style="border:1px solid #e2e8f0; border-radius:20px; padding:12px; margin-bottom:12px; display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center;">
        <div><strong>${escapeHtml(p.name)}</strong> | ₹${p.price} | ${p.category || 'no cat'}</div>
        <div>
          <button class="edit-btn" onclick="editProduct('${p.id}')"><i class="fas fa-edit"></i> Edit</button>
          <button class="delete-btn" onclick="deleteProduct('${p.id}')"><i class="fas fa-trash"></i> Delete</button>
        </div>
      </div>
    `).join('');
  }

  window.editProduct = async (id) => {
    const product = allProducts.find(p => p.id === id);
    if(!product) return;
    const newName = prompt("Edit Product Name", product.name);
    if(newName === null) return;
    const newPrice = prompt("Price", product.price);
    const newMrp = prompt("MRP", product.mrp);
    const newCategory = prompt("Category", product.category);
    const updates = {
      name: newName,
      price: newPrice,
      mrp: newMrp,
      category: newCategory,
      updatedAt: Date.now()
    };
    await database.ref(`products/${id}`).update(updates);
    await loadProducts();
    await refreshAdminProductList();
    alert("Product updated!");
  };

  window.deleteProduct = async (id) => {
    if(confirm("Delete product permanently?")) {
      await database.ref(`products/${id}`).remove();
      await loadProducts();
      await refreshAdminProductList();
      alert("Deleted");
    }
  };

  async function publishProduct() {
    const name = document.getElementById('prodName').value.trim();
    const price = document.getElementById('prodPrice').value.trim();
    const mrp = document.getElementById('prodMrp').value.trim();
    const image = document.getElementById('prodImage').value.trim();
    const desc = document.getElementById('prodDesc').value.trim();
    const category = document.getElementById('prodCategory').value.trim();
    const quantity = document.getElementById('prodQty').value.trim();
    const whatsapp = document.getElementById('prodWhatsapp').value.trim();
    if(!name || !price || !image) {
      document.getElementById('sellerMsg').innerHTML = '<div class="success-msg" style="background:#fee2e2;">Please fill Name, Price and Image URL</div>';
      return;
    }
    const newProduct = {
      name, price, mrp, image, description: desc, category, quantity, whatsapp,
      createdAt: Date.now()
    };
    try {
      await database.ref('products').push(newProduct);
      document.getElementById('sellerMsg').innerHTML = '<div class="success-msg">✅ Product published successfully!</div>';
      document.getElementById('prodName').value = '';
      document.getElementById('prodPrice').value = '';
      document.getElementById('prodMrp').value = '';
      document.getElementById('prodImage').value = '';
      document.getElementById('prodDesc').value = '';
      document.getElementById('prodCategory').value = '';
      document.getElementById('prodQty').value = '';
      document.getElementById('prodWhatsapp').value = '';
      await loadProducts();
      setTimeout(() => document.getElementById('sellerMsg').innerHTML = '', 2000);
    } catch(e) {
      alert("Firebase error: " + e.message);
    }
  }

  function contactManager() {
    window.open("https://wa.me/917982095149?text=Hi%20Manager,%20I%20want%20to%20become%20a%20seller%20on%20Drozioo", "_blank");
  }

  function showSellerLogin() { document.getElementById('sellerLoginModal').style.display = 'flex'; }
  function showAdminLogin() { document.getElementById('adminLoginModal').style.display = 'flex'; }
  function showHome() { 
    currentCategoryFilter = "all";
    document.getElementById('searchInput').value = '';
    renderProducts(); 
  }
  function closeModal(id) { document.getElementById(id).style.display = 'none'; }

  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  // seed default passwords & sample product if empty (respect firebase rules, no write rule issue only if authenticated via client but we write once)
  async function initializeDefaults() {
    const pwdSnapshot = await database.ref('passwords').once('value');
    if(!pwdSnapshot.exists()) {
      await database.ref('passwords').set({
        adminPassword: "admin123",
        sellerPassword: "seller123"
      });
    }
    const prodSnapshot = await database.ref('products').once('value');
    if(!prodSnapshot.exists()) {
      const sample = {
        name: "Classic Denim Jacket",
        price: "1999",
        mrp: "3999",
        image: "https://images.unsplash.com/photo-1551537482-f2075a1d41f2?w=400",
        description: "Premium quality denim, perfect for winters.",
        category: "Fashion",
        quantity: "8",
        whatsapp: "917982095149",
        createdAt: Date.now()
      };
      await database.ref('products').push(sample);
    }
    await loadProducts();
  }

  window.onclick = function(e) {
    if(e.target.classList.contains('modal')) e.target.style.display = 'none';
  };
  initializeDefaults();
</script>
</body>
</html>
